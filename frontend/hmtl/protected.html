<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Protected</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body class="auth-page">
    <script src="../js/authGuard.js"></script>
    <div class="card">
      <h2 class="auth-logo">MealMajor Dashboard</h2>
      <p id="welcome"></p>

      <div class="auth-switch" style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:24px;">
        <a href="profile.html" class="btn-primary" style="width:auto;min-width:120px;color:white;">View Profile</a>
        <a href="recipes.html" class="btn-primary" style="width:auto;min-width:120px;color:white;">View Recipes</a>
        <a href="createRecipe.html" class="btn-primary" style="width:auto;min-width:120px;color:white;">Create Recipe</a>
        <a href="mealPlan.html" class="btn-primary" style="width:auto;min-width:120px;color:white;">Meal Planner</a> <!-- ✅ NEW -->
      </div>

      <button id="logout" style="margin-top:18px;">Logout</button>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const email = localStorage.getItem('userEmail') || '';
        document.getElementById('welcome').textContent = email ? `Signed in as ${email}` : 'Signed in';

        document.getElementById('logout').addEventListener('click', () => {
          if (typeof window.logoutUser === 'function') {
            window.logoutUser();
          } else {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userId'); // ✅ also clear userId on logout
            window.location.href = './login.html';
          }
        });
      });
    </script>
  </body>
</html>
